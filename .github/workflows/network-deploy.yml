name: Network CI/CD

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: self-hosted
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Syntax check
        run: |
          ansible-playbook --syntax-check playbooks/render.yml
          ansible-playbook --syntax-check playbooks/deploy.yml
          ansible-playbook --syntax-check playbooks/verify.yml

      - name: Render configs
        run: |
          ansible-playbook playbooks/render.yml

      - name: Upload rendered configs
        uses: actions/upload-artifact@v4
        with:
          name: rendered-configs
          path: rendered/

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: validate
    runs-on: self-hosted
    environment: lab
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          pip install ansible
          ansible-galaxy collection install -r requirements.yml

      - name: Build runtime secrets file
        run: |
          mkdir -p inventories/lab/group_vars
          cat > inventories/lab/group_vars/secrets.yml <<EOF
          ansible_user: ${{ secrets.LAB_ANSIBLE_USER }}
          ansible_password: ${{ secrets.LAB_ANSIBLE_PASSWORD }}
          ansible_become_password: ${{ secrets.LAB_ENABLE_PASSWORD }}
          EOF

      - name: Render configs
        run: |
          ansible-playbook playbooks/render.yml

      - name: Validate access to routers
        run: |
          ansible-playbook playbooks/validate.yml

      - name: Deploy configs
        run: |
          ansible-playbook playbooks/deploy.yml

      - name: Verify routing
        run: |
          ansible-playbook playbooks/verify.yml
